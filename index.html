<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANGABLE — 日本漫畫中文資料庫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e0e;--bg2:#161616;--bg3:#1e1e1e;--border:#2a2a2a;--border2:#333;
  --text:#f0ede6;--text2:#a09890;--text3:#5a5450;
  --accent:#e8c97a;--accent2:#c4a855;--red:#e85d4a;--green:#4caf7d;--blue:#5b9bd5;
  --font-display:'Noto Serif TC',serif;--font-body:'Noto Sans TC',sans-serif;--font-mono:'Space Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.75;min-height:100vh;}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(14,14,14,0.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;gap:1.5rem;height:56px;}
.logo{font-family:var(--font-mono);font-size:15px;font-weight:700;color:var(--accent);letter-spacing:.15em;text-decoration:none;white-space:nowrap;cursor:pointer;}
.logo span{color:var(--text3);font-weight:400;}
.search-wrap{flex:1;max-width:480px;position:relative;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3);}
#search{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:7px 12px 7px 34px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color .2s;}
#search:focus{border-color:var(--accent2);}
#search::placeholder{color:var(--text3);}
nav{display:flex;gap:.25rem;margin-left:auto;align-items:center;}
.nav-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-family:var(--font-body);font-size:13px;padding:0 .875rem;height:56px;transition:color .2s;text-decoration:none;display:flex;align-items:center;}
.nav-btn:hover{color:var(--text);}
.nav-btn.primary{background:var(--accent);color:#000;font-weight:500;border-radius:6px;height:32px;padding:0 1rem;}
.nav-btn.primary:hover{background:var(--accent2);}

/* HERO */
.hero{padding:3rem 2rem 2rem;border-bottom:1px solid var(--border);}
.hero h1{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;line-height:1.2;margin-bottom:.5rem;}
.hero h1 em{color:var(--accent);font-style:normal;}
.hero p{color:var(--text2);font-size:13px;max-width:480px;}
.stats-row{display:flex;gap:2rem;margin-top:1.5rem;}
.stat{display:flex;flex-direction:column;gap:2px;}
.stat-num{font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--accent);}
.stat-label{font-size:12px;color:var(--text3);letter-spacing:.05em;}

/* FILTERS */
.filters{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:11px;color:var(--text3);margin-right:.25rem;letter-spacing:.05em;}
.chip{background:none;border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font-body);}
.chip:hover{border-color:var(--accent2);color:var(--text);}
.chip.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:500;}

/* GRID */
.main{padding:1.5rem 2rem 3rem;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.section-title{font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.result-count{font-size:13px;color:var(--text3);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1.25rem;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;text-decoration:none;color:inherit;display:block;}
.card:hover{transform:translateY(-3px);border-color:var(--border2);}
.card-cover{width:100%;aspect-ratio:2/3;background:var(--bg3);position:relative;overflow:hidden;}
.card-cover img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.card:hover .card-cover img{transform:scale(1.04);}
.card-cover-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px;font-family:var(--font-mono);}
.status-badge{position:absolute;top:8px;left:8px;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;font-family:var(--font-mono);}
.status-ongoing{background:rgba(76,175,125,.2);color:#4caf7d;border:1px solid rgba(76,175,125,.3);}
.status-complete{background:rgba(91,155,213,.2);color:#5b9bd5;border:1px solid rgba(91,155,213,.3);}
.status-hiatus{background:rgba(232,93,74,.15);color:#e85d4a;border:1px solid rgba(232,93,74,.25);}
.card-body{padding:10px 10px 12px;}
.card-title{font-size:15px;font-weight:500;line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-ja{font-size:13px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
.card-author{font-size:13px;color:var(--text2);}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.tag{font-size:12px;padding:1px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text3);}

.loading-row{grid-column:1/-1;display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--text3);font-family:var(--font-mono);font-size:12px;gap:.75rem;}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{grid-column:1/-1;text-align:center;padding:4rem;color:var(--text3);font-size:13px;}
#load-more-trigger{height:40px;grid-column:1/-1;}

/* DETAIL PAGE */
#detail-page{display:none;min-height:100vh;}
#detail-page.active{display:block;}
#list-page{display:block;}
#list-page.hidden{display:none;}

.detail-hero{display:flex;gap:2rem;padding:2rem;border-bottom:1px solid var(--border);}
.detail-cover{width:180px;flex-shrink:0;aspect-ratio:2/3;border-radius:8px;overflow:hidden;background:var(--bg3);}
.detail-cover img{width:100%;height:100%;object-fit:cover;}
.detail-cover-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px;font-family:var(--font-mono);}
.detail-info{flex:1;min-width:0;}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;margin-bottom:1rem;background:none;border:none;font-family:var(--font-body);padding:0;transition:color .2s;}
.back-btn:hover{color:var(--text);}
.detail-title{font-family:var(--font-display);font-size:1.8rem;font-weight:700;line-height:1.2;margin-bottom:4px;}
.detail-ja{font-size:13px;color:var(--text3);margin-bottom:1rem;}
.meta-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem;}
.meta-row{display:flex;gap:.75rem;align-items:baseline;}
.meta-key{font-size:13px;color:var(--text3);width:72px;flex-shrink:0;}
.meta-val{font-size:15px;color:var(--text);}
.detail-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s;font-family:var(--font-body);text-decoration:none;}
.btn:hover{border-color:var(--accent2);color:var(--text);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#000;}
.btn.primary:hover{background:var(--accent2);}
.xml-output{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:1rem;font-family:var(--font-mono);font-size:11px;color:#4caf7d;white-space:pre;overflow-x:auto;margin-top:1rem;max-height:260px;overflow-y:auto;display:none;}

.detail-body{padding:2rem;}
.sec-h{font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}
.sec-h-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}
.sec-h-row .sec-h{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.summary-text{font-size:14px;color:var(--text2);line-height:1.9;margin-bottom:2rem;white-space:pre-line;}
.genres-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:2rem;}
.genre-tag{font-size:13px;padding:3px 10px;border:1px solid var(--border2);border-radius:4px;color:var(--text2);}

.volumes-list{display:flex;flex-direction:column;gap:10px;}
.vol-item{display:flex;gap:1rem;padding:1rem;border-radius:8px;background:var(--bg3);border:1px solid var(--border);position:relative;}
.vol-cover{width:90px;flex-shrink:0;aspect-ratio:2/3;border-radius:6px;overflow:hidden;background:var(--bg);}
.vol-cover img{width:100%;height:100%;object-fit:cover;}
.vol-cover-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--text3);}
.vol-info{flex:1;min-width:0;}
.vol-num{font-family:var(--font-mono);font-size:12px;color:var(--accent);margin-bottom:2px;}
.vol-title{font-size:15px;font-weight:500;margin-bottom:4px;}
.vol-summary{font-size:14px;color:var(--text2);line-height:1.7;white-space:pre-line;}
.vol-meta{font-size:13px;color:var(--text3);margin-top:4px;}
.vol-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.vol-btn{background:none;border:1px solid var(--border2);border-radius:4px;color:var(--text3);font-size:11px;padding:2px 8px;cursor:pointer;font-family:var(--font-body);transition:all .15s;}
.vol-btn:hover{color:var(--text);border-color:var(--accent2);}
.no-vols{font-size:13px;color:var(--text3);text-align:center;padding:2rem;}
.vol-view-btn{background:none;border:1px solid var(--border2);border-radius:4px;padding:4px 10px;cursor:pointer;color:var(--text3);font-size:12px;font-family:var(--font-body);transition:all .15s;}
.vol-view-btn.active{border-color:var(--accent);color:var(--accent);}
.vol-view-btn:hover{border-color:var(--border2);color:var(--text);}
.volumes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.vg-item{cursor:pointer;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--bg2);transition:transform .2s,border-color .2s;}
.vg-item:hover{transform:translateY(-3px);border-color:var(--accent);}
.vg-cover{width:100%;aspect-ratio:2/3;background:var(--bg3);position:relative;}
.vg-cover img{width:100%;height:100%;object-fit:cover;}
.vg-badge{position:absolute;bottom:0;left:0;right:0;background:rgba(14,14,14,.85);font-family:var(--font-mono);font-size:12px;color:var(--accent);text-align:center;padding:6px 0;}
.vol-popup-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.82);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1rem;}
.vol-popup-overlay.open{display:flex;}
.vol-popup{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:700px;overflow:hidden;display:flex;position:relative;animation:slideUp .2s ease;}
.vp-cover{width:200px;flex-shrink:0;aspect-ratio:2/3;}
.vp-cover img{width:100%;height:100%;object-fit:cover;}
.vp-cover-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px;font-family:var(--font-mono);}
.vp-info{flex:1;padding:18px;min-width:0;overflow-y:auto;max-height:420px;}
.vp-close{position:absolute;top:10px;right:10px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.vp-close:hover{color:var(--text);}
.vp-num{font-family:var(--font-mono);font-size:12px;color:var(--accent);margin-bottom:4px;}
.vp-title{font-size:16px;font-weight:500;margin-bottom:10px;}
.vp-summary{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:10px;white-space:pre-line;}
.vp-meta{font-size:13px;color:var(--text3);margin-bottom:12px;display:flex;flex-direction:column;gap:4px;}
.vp-meta span{color:var(--text2);}

/* FORM OVERLAY */
.overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);overflow-y:auto;padding:2rem 1rem;}
.overlay.open{display:flex;align-items:flex-start;justify-content:center;}
.form-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:620px;padding:2rem;animation:slideUp .25s ease;position:relative;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}}
.form-modal h2{font-family:var(--font-display);font-size:1.3rem;margin-bottom:.25rem;}
.form-modal .subtitle{font-size:12px;color:var(--text3);margin-bottom:1.5rem;}
.modal-close{position:absolute;top:1rem;right:1rem;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:color .2s;}
.modal-close:hover{color:var(--text);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
label{font-size:11px;color:var(--text3);letter-spacing:.04em;}
input,textarea,select{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color .2s;width:100%;}
input:focus,textarea:focus,select:focus{border-color:var(--accent2);}
input::placeholder,textarea::placeholder{color:var(--text3);}
textarea{resize:vertical;min-height:80px;}
select option{background:var(--bg3);}
.form-actions{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem;}

.toast{position:fixed;bottom:2rem;right:2rem;z-index:500;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--text);transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;max-width:300px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:rgba(76,175,125,.4);}
.toast.error{border-color:rgba(232,93,74,.4);}

@media(max-width:640px){
  header{padding:0 1rem;gap:.75rem;}
  .hero,.filters,.main{padding-left:1rem;padding-right:1rem;}
  .detail-hero{flex-direction:column;gap:1rem;}
  .detail-cover{width:140px;}
  .form-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
  <span class="logo" onclick="goHome()">MANGABLE<span>.db</span></span>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="搜尋漫畫、作者、出版社…">
  </div>
  <nav>
    <button class="nav-btn primary" onclick="openMangaForm()">+ 提交漫畫</button>
    <a class="nav-btn" href="https://lzyplcvyinipkghfdvtx.supabase.co/rest/v1/manga?select=*" target="_blank">API</a>
  </nav>
</header>

<!-- LIST PAGE -->
<div id="list-page">
  <section class="hero">
    <h1>日本漫畫<em>中文</em>資料庫</h1>
    <p>收錄日本漫畫的完整中文元數據，支援 ComicInfo.xml 匯出與開放 API 調用。</p>
    <div class="stats-row">
      <div class="stat"><span class="stat-num" id="stat-manga">—</span><span class="stat-label">部漫畫</span></div>
      <div class="stat"><span class="stat-num" id="stat-volumes">—</span><span class="stat-label">本單行本</span></div>
    </div>
  </section>
  <div class="filters">
    <span class="filter-label">狀態</span>
    <button class="chip active" onclick="setFilter('',this)">全部</button>
    <button class="chip" onclick="setFilter('连载中',this)">連載中</button>
    <button class="chip" onclick="setFilter('完结',this)">完結</button>
    <button class="chip" onclick="setFilter('休刊',this)">休刊</button>
  </div>
  <main class="main">
    <div class="section-header">
      <span class="section-title">漫畫列表</span>
      <span class="result-count" id="result-count"></span>
    </div>
    <div class="grid" id="grid"></div>
    <div id="load-more-trigger"></div>
  </main>
</div>

<!-- DETAIL PAGE -->
<div id="detail-page">
  <div class="detail-hero" id="detail-hero"></div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- MANGA FORM -->
<div class="overlay" id="mangaFormOverlay" onclick="overlayClick(event,'mangaFormOverlay',closeMangaForm)">
  <div class="form-modal">
    <button class="modal-close" onclick="closeMangaForm()">×</button>
    <h2 id="mangaFormTitle">提交新漫畫</h2>
    <p class="subtitle">資料將在審核後公開顯示</p>
    <div class="form-grid">
      <div class="form-group"><label>標題（中文）*</label><input type="text" id="f-title-zh" placeholder="魔女守護者"></div>
      <div class="form-group"><label>標題（日文）</label><input type="text" id="f-title-ja" placeholder="WITCH WATCH"></div>
      <div class="form-group"><label>作者（原作）</label><input type="text" id="f-writer" placeholder="篠原健太"></div>
      <div class="form-group"><label>作畫（如與原作不同）</label><input type="text" id="f-penciller" placeholder="留空則同原作"></div>
      <div class="form-group"><label>出版社</label><input type="text" id="f-publisher" placeholder="集英社"></div>
      <div class="form-group"><label>連載刊物</label><input type="text" id="f-imprint" placeholder="週刊少年JUMP"></div>
      <div class="form-group"><label>連載狀態</label>
        <select id="f-status"><option value="连载中">連載中</option><option value="完结">完結</option><option value="休刊">休刊</option></select>
      </div>
      <div class="form-group"><label>年齡分級</label>
        <select id="f-age"><option value="Everyone">全年齡</option><option value="Teen">青少年</option><option value="Mature 17+">成熟 17+</option><option value="Adults Only 18+">成人 18+</option></select>
      </div>
      <div class="form-group"><label>類型（逗號分隔）</label><input type="text" id="f-genres" placeholder="少年, 搞笑, 戰鬥"></div>
      <div class="form-group"><label>標籤（逗號分隔）</label><input type="text" id="f-tags" placeholder="JUMP, 超能力"></div>
      <div class="form-group"><label>封面圖片網址</label><input type="text" id="f-cover" placeholder="https://…"></div>
      <div class="form-group"><label>開始年份</label><input type="number" id="f-year" placeholder="2021"></div>
      <div class="form-group"><label>開始月份</label><input type="number" id="f-month" placeholder="1" min="1" max="12"></div>
      <div class="form-group"><label>總卷數</label><input type="number" id="f-count" placeholder="—"></div>
      <div class="form-group"><label>官方網址</label><input type="text" id="f-web" placeholder="https://…"></div>
      <div class="form-group"><label>評分（0–5）</label><input type="number" id="f-rating" placeholder="4.5" min="0" max="5" step="0.1"></div>
      <div class="form-group full"><label>簡介</label><textarea id="f-summary" rows="4" placeholder="請輸入漫畫故事簡介…"></textarea></div>
      <div class="form-group full"><label>備註</label><textarea id="f-notes" rows="2" placeholder="編輯備註…"></textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeMangaForm()">取消</button>
      <button class="btn primary" id="mangaFormSubmitBtn" onclick="submitManga()">提交</button>
    </div>
  </div>
</div>

<!-- VOLUME FORM -->
<div class="overlay" id="volFormOverlay" onclick="overlayClick(event,'volFormOverlay',closeVolForm)">
  <div class="form-modal">
    <button class="modal-close" onclick="closeVolForm()">×</button>
    <h2 id="volFormTitle">新增單行本</h2>
    <p class="subtitle" id="volFormSub"></p>
    <div class="form-grid">
      <div class="form-group"><label>卷號 *</label><input type="number" id="v-number" placeholder="1" min="1"></div>

// ── API ────────────────────────────────────────────────────
async function api(path,opts={}){
  const r=await fetch(SURL+'/rest/v1/'+path,{headers:H,...opts});
  if(opts.method&&opts.method!=='GET'&&r.status<300)return r;
  return r.json();
}

async function countManga(filter,search,tagFilter){
  let p=`manga?select=id`;
  if(filter)p+=`&status=eq.${encodeURIComponent(filter)}`;
  if(tagFilter){
    const q=encodeURIComponent(`*${tagFilter}*`);
    p+=`&or=(genres.cs.${encodeURIComponent('{"'+tagFilter+'"}')},tags.cs.${encodeURIComponent('{"'+tagFilter+'"}')})`;
  } else if(search){
    const q=encodeURIComponent(`%${search}%`);
    p+=`&or=(title_zh.ilike.${q},title_ja.ilike.${q},writer.ilike.${q},publisher.ilike.${q},imprint.ilike.${q})`;
  }
  const r=await fetch(SURL+'/rest/v1/'+p,{
    headers:{...H,'Prefer':'count=exact','Range':'0-0'}
  });
  return parseInt(r.headers.get('content-range')?.split('/')[1]||0);
}

async function fetchManga(filter,search,tagFilter,offset){
  let p=`manga?select=id,title_zh,title_ja,cover_url,writer,status,genres,latest_release&order=latest_release.desc.nullslast,created_at.desc&limit=${PAGE_SIZE}&offset=${offset}`;
  if(filter)p+=`&status=eq.${encodeURIComponent(filter)}`;
  if(tagFilter){
    p+=`&or=(genres.cs.${encodeURIComponent('{"'+tagFilter+'"}')},tags.cs.${encodeURIComponent('{"'+tagFilter+'"}')})`;
  } else if(search){
    const q=encodeURIComponent(`%${search}%`);
    p+=`&or=(title_zh.ilike.${q},title_ja.ilike.${q},writer.ilike.${q},publisher.ilike.${q},imprint.ilike.${q})`;
  }
  return api(p);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function formatDate(d){
  if(!d)return null;
  const p=d.slice(0,10).split('-');
  return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日';
}
function formatYM(year,month){
  if(!year)return null;
  return year+'年'+(month?month+'月':'');
}

async function loadMore(){
  if(state.loading||!state.hasMore)return;
  state.loading=true;
  const grid=document.getElementById('grid');
  if(state.offset===0){
    grid.innerHTML='<div class="loading-row"><div class="spinner"></div>載入中…</div>';
    state.total=await countManga(state.filter,state.search);
    document.getElementById('result-count').textContent=state.total.toLocaleString()+' 部';
  }
  const data=await fetchManga(state.filter,state.search,state.offset);
  if(state.offset===0)grid.innerHTML='';
  if(!Array.isArray(data)||!data.length){
    if(state.offset===0)grid.innerHTML='<div class="empty">沒有找到相關漫畫</div>';
    state.hasMore=false;
    state.loading=false;
    return;
  }
  grid.insertAdjacentHTML('beforeend',renderCards(data));
  state.offset+=data.length;
  state.hasMore=data.length===PAGE_SIZE;
  state.loading=false;
}

  state.offset=0;state.hasMore=true;state.total=null;

// ── XML EXPORT ────────────────────────────────────────────
function buildXML(m,vol){
  const x=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let year='',month='',day='';
  if(vol?.publish_date){const p=vol.publish_date.split('-');year=p[0]||'';month=p[1]||'';day=p[2]||'';}
  else{year=m.start_year||'';month=m.start_month||'';}
  const summary=vol?.summary||m.summary||'';
  return `<?xml version="1.0" encoding="utf-8"?>
<ComicInfo xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <Series>${x(m.title_zh)}</Series>
  <LocalizedSeries>${x(m.title_ja)}</LocalizedSeries>
  <Number>${vol?vol.volume_number:''}</Number>
  <Count>${m.volume_count||''}</Count>
  <Summary>${x(summary)}</Summary>
  <Publisher>${x(m.publisher)}</Publisher>
  <Imprint>${x(m.imprint)}</Imprint>
  <Writer>${x(m.writer)}</Writer>
  <Penciller>${x(m.penciller||m.writer)}</Penciller>
  <CoverArtist>${x(m.cover_artist||m.writer)}</CoverArtist>
  <Genre>${x((m.genres||[]).join(','))}</Genre>
  <Tags>${x((m.tags||[]).join(','))}</Tags>
  <Web>${x(m.web_url)}</Web>
  <AgeRating>${x(m.age_rating)}</AgeRating>
  <BlackAndWhite>${m.is_bw?'Yes':'No'}</BlackAndWhite>
  <Manga>${x(m.manga_direction||'YesAndRightToLeft')}</Manga>
  <LanguageISO>${x(m.language||'ja')}</LanguageISO>
  <Year>${year}</Year><Month>${month}</Month><Day>${day}</Day>
  <CommunityRating>${m.rating||''}</CommunityRating>
  <Notes>${x(m.notes)}</Notes>
</ComicInfo>`;
}

function exportXML(vol){
  const m=state.currentManga;if(!m)return;
  const xml=buildXML(m,vol||null);
  const out=document.getElementById('xmlOutput');
  out.textContent=xml;out.style.display='block';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([xml],{type:'application/xml'}));
  a.download=(m.title_zh||'manga')+(vol?`_Vol${vol.volume_number}`:'')+`_ComicInfo.xml`;
  a.click();
  showToast('✓ ComicInfo.xml 已下載','success');
}

  f('f-cover',isEdit?manga.cover_url:'');f('f-year',isEdit?manga.start_year:'');
  f('f-month',isEdit?manga.start_month:'');f('f-count',isEdit?manga.volume_count:'');
  f('f-web',isEdit?manga.web_url:'');f('f-rating',isEdit?manga.rating:'');
  f('f-summary',isEdit?manga.summary:'');f('f-notes',isEdit?manga.notes:'');
  f('f-genres',isEdit?(manga.genres||[]).join(', '):'');
  f('f-tags',isEdit?(manga.tags||[]).join(', '):'');
  if(isEdit){document.getElementById('f-status').value=manga.status||'连载中';document.getElementById('f-age').value=manga.age_rating||'Everyone';}
  document.getElementById('mangaFormOverlay').classList.add('open');document.body.style.overflow='hidden';
}
function closeMangaForm(){document.getElementById('mangaFormOverlay').classList.remove('open');document.body.style.overflow='';}

async function submitManga(){
  const zh=document.getElementById('f-title-zh').value.trim();
  if(!zh){showToast('請填寫中文標題','error');return;}
  const writer=document.getElementById('f-writer').value.trim();
  const penciller=document.getElementById('f-penciller').value.trim();
  const body={
    title_zh:zh,title_ja:document.getElementById('f-title-ja').value.trim()||null,
    writer:writer||null,penciller:penciller||writer||null,
    publisher:document.getElementById('f-publisher').value.trim()||null,
    imprint:document.getElementById('f-imprint').value.trim()||null,
    status:document.getElementById('f-status').value,age_rating:document.getElementById('f-age').value,
    genres:document.getElementById('f-genres').value.split(',').map(s=>s.trim()).filter(Boolean)||null,
    tags:document.getElementById('f-tags').value.split(',').map(s=>s.trim()).filter(Boolean)||null,
    cover_url:document.getElementById('f-cover').value.trim()||null,
    start_year:parseInt(document.getElementById('f-year').value)||null,
    start_month:parseInt(document.getElementById('f-month').value)||null,
    volume_count:parseInt(document.getElementById('f-count').value)||null,
    web_url:document.getElementById('f-web').value.trim()||null,
    rating:parseFloat(document.getElementById('f-rating').value)||null,
    summary:document.getElementById('f-summary').value.trim()||null,
    notes:document.getElementById('f-notes').value.trim()||null,
  };
  const m=state.editingManga;
  const r=m
    ?await fetch(`${SURL}/rest/v1/manga?id=eq.${m.id}`,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(body)})
    :await fetch(`${SURL}/rest/v1/manga`,{method:'POST',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(body)});
  if(r.ok){
    showToast(m?'✓ 資料已更新':'✓ 提交成功！','success');
    closeMangaForm();
    if(m&&state.currentManga?.id===m.id)renderDetail(m.id);
    else{resetGrid();loadStats();}
  }else{showToast('操作失敗，請稍後再試','error');}
}

// ── VOLUME FORM ───────────────────────────────────────────
function openVolForm(vol=null){
  state.editingVol=vol;
  document.getElementById('volFormTitle').textContent=vol?'編輯單行本':'新增單行本';
  document.getElementById('volFormSub').textContent=state.currentManga?.title_zh||'';
  document.getElementById('volFormSubmitBtn').textContent=vol?'儲存變更':'新增';
  const f=(id,val)=>{const el=document.getElementById(id);if(el)el.value=val||'';};
  f('v-number',vol?vol.volume_number:'');f('v-title',vol?vol.title:'');
  f('v-summary',vol?vol.summary:'');f('v-cover',vol?vol.cover_url:'');
  f('v-isbn',vol?vol.isbn:'');f('v-date',vol?vol.publish_date:'');f('v-pages',vol?vol.page_count:'');
  document.getElementById('volFormOverlay').classList.add('open');document.body.style.overflow='hidden';
}
function closeVolForm(){document.getElementById('volFormOverlay').classList.remove('open');document.body.style.overflow='';}

async function submitVolume(){
  const num=parseInt(document.getElementById('v-number').value);
  if(!num){showToast('請填寫卷號','error');return;}
  if(!state.currentManga){showToast('找不到漫畫資料','error');return;}
  const body={
    manga_id:state.currentManga.id,volume_number:num,
    title:document.getElementById('v-title').value.trim()||null,
    summary:document.getElementById('v-summary').value.trim()||null,
    cover_url:document.getElementById('v-cover').value.trim()||null,
    isbn:document.getElementById('v-isbn').value.trim()||null,
    publish_date:document.getElementById('v-date').value||null,
    page_count:parseInt(document.getElementById('v-pages').value)||null,
  };
  const v=state.editingVol;
  const r=v
    ?await fetch(`${SURL}/rest/v1/volumes?id=eq.${v.id}`,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(body)})
    :await fetch(`${SURL}/rest/v1/volumes`,{method:'POST',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(body)});
  if(r.ok){
    showToast(v?'✓ 單行本已更新':'✓ 單行本已新增','success');
    closeVolForm();
    loadVolumes(state.currentManga.id);
  }else{showToast('操作失敗','error');}
}

// ── UTILS ─────────────────────────────────────────────────
function overlayClick(e,id,fn){if(e.target===document.getElementById(id))fn();}
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type;
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── INIT ──────────────────────────────────────────────────
const initId=new URLSearchParams(location.search).get('id');
if(initId){renderDetail(initId);}
else{loadStats();loadMore();}
</script>
</body>
</html>
