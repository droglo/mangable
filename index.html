<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANGABLE — 日本漫畫中文資料庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e0e;--bg2:#131313;--bg3:#1a1a1a;--bg4:#222;
  --border:#1e1e1e;--border2:#2a2a2a;--border3:#333;
  --text:#f0ede6;--text2:#a09890;--text3:#5a5450;--text4:#333;
  --accent:#e8c97a;--accent2:#c4a855;--accent3:#f5dfa0;
  --green:#4caf7d;--blue:#5b9bd5;--red:#e85d4a;
  --mono:'Space Mono',monospace;--serif:'Noto Serif TC',serif;--sans:'Noto Sans TC',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.75;min-height:100vh;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:var(--sans);}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:200;background:rgba(14,14,14,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 28px;gap:16px;}
.logo{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--accent);letter-spacing:.15em;cursor:pointer;white-space:nowrap;}
.logo span{color:var(--text4);font-weight:400;}
.search-wrap{flex:1;max-width:440px;position:relative;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3);pointer-events:none;}
#searchInput{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 14px 8px 34px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .2s;}
#searchInput:focus{border-color:var(--accent2);}
#searchInput::placeholder{color:var(--text3);}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.hbtn{background:none;border:none;color:var(--text2);font-size:13px;padding:6px 12px;border-radius:5px;transition:color .2s;}
.hbtn:hover{color:var(--text);}
.hbtn.pri{background:var(--accent);color:#000;font-weight:500;}
.hbtn.pri:hover{background:var(--accent2);}

/* ── PAGES ── */
.page{display:none;}
.page.active{display:block;}

/* ── HOME: BANNER ── */
.banner-outer{position:relative;overflow:hidden;background:var(--bg2);border-bottom:1px solid var(--border);}
.banner-track{display:flex;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.banner-slide{min-width:100%;height:260px;display:flex;align-items:center;padding:0 32px;position:relative;overflow:hidden;}
.slide-content{position:relative;z-index:2;max-width:560px;}
.slide-tag{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.12em;margin-bottom:8px;}
.slide-title{font-family:var(--serif);font-size:clamp(1.6rem,2.5vw,2.8rem);font-weight:700;line-height:1.2;margin-bottom:6px;}
.slide-sub{font-size:14px;color:var(--text2);margin-bottom:16px;}
.slide-btn{display:inline-block;background:var(--accent);color:#000;font-size:13px;font-weight:500;padding:9px 22px;border-radius:6px;transition:background .15s;}
.slide-btn:hover{background:var(--accent2);}
.slide-cover{position:absolute;right:0;top:0;height:100%;width:260px;overflow:hidden;opacity:.25;}
.slide-cover img{width:100%;height:100%;object-fit:cover;object-position:top;}
.banner-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:3;}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--border3);cursor:pointer;transition:background .2s,transform .2s;}
.bdot.on{background:var(--accent);transform:scale(1.3);}
.barr{position:absolute;top:50%;transform:translateY(-50%);z-index:3;background:rgba(0,0,0,.5);border:1px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;transition:color .2s;}
.barr:hover{color:var(--text);}
.barr.l{left:10px;}.barr.r{right:10px;}
.banner-empty{height:80px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;}

/* ── HOME: NEWS ── */
.news-bar{background:var(--bg2);border-bottom:1px solid var(--border);height:38px;display:flex;align-items:center;overflow:hidden;}
.news-label{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.1em;padding:0 18px;border-right:1px solid var(--border2);white-space:nowrap;height:100%;display:flex;align-items:center;}
.news-track{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;}
.news-inner{display:flex;white-space:nowrap;animation:ticker 30s linear infinite;}
.news-inner:hover{animation-play-state:paused;}
.ni{font-size:13px;color:var(--text2);padding:0 32px;}
.ni b{color:var(--text);font-weight:400;}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.news-empty{flex:1;display:flex;align-items:center;padding:0 16px;font-size:12px;color:var(--text3);}

/* ── HOME: SECTIONS ── */
.home-body{padding:24px 28px 48px;max-width:2400px;margin:0 auto;}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.stitle{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.smore{background:none;border:none;font-size:12px;color:var(--accent);padding:0;}
.smore:hover{color:var(--accent3);}

/* 最近更新 */
.recent-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:14px;margin-bottom:36px;}
@media(max-width:1600px){.recent-grid{grid-template-columns:repeat(8,1fr);}}
@media(max-width:1200px){.recent-grid{grid-template-columns:repeat(6,1fr);}}
@media(max-width:800px){.recent-grid{grid-template-columns:repeat(4,1fr);}}
@media(max-width:500px){.recent-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:2400px){.recent-grid{grid-template-columns:repeat(14,1fr);}}
@media(min-width:3200px){.recent-grid{grid-template-columns:repeat(20,1fr);}}
.rc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;}
.rc:hover{transform:translateY(-3px);border-color:var(--border2);}
.rc-cover{width:100%;aspect-ratio:2/3;background:var(--bg3);position:relative;}
.rc-cover img{width:100%;height:100%;object-fit:cover;}
.rc-new{position:absolute;top:6px;left:6px;background:var(--accent);color:#000;font-size:9px;font-weight:700;font-family:var(--mono);padding:2px 5px;border-radius:3px;}
.rc-body{padding:9px 11px 11px;}
.rc-vol{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:2px;}
.rc-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-date{font-size:12px;color:var(--text3);margin-top:3px;}

/* 分類 */
.cat-section{margin-bottom:28px;}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(160px,14vw,260px),1fr));gap:10px;}
.cat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .2s,background .2s;}
.cat:hover{border-color:var(--border3);background:var(--bg3);}
.cat-ico{width:38px;height:38px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.cat-name{font-size:14px;font-weight:500;}
.cat-cnt{font-size:12px;color:var(--text3);margin-top:2px;}

/* 狀態卡 */
.status-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.stc{border-radius:8px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:opacity .2s;}
.stc:hover{opacity:.85;}
.stc-label{font-size:13px;font-weight:500;}
.stc-sub{font-size:11px;margin-top:2px;}
.stc-num{font-family:var(--mono);font-size:20px;font-weight:700;}

/* ── SEARCH PAGE ── */
.search-page{padding:16px 28px 48px;max-width:2400px;margin:0 auto;}
.search-top{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{background:none;border:1px solid var(--border2);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--text2);transition:all .15s;}
.chip:hover{border-color:var(--border3);color:var(--text);}
.chip.on{background:var(--accent);border-color:var(--accent);color:#000;font-weight:500;}
.result-info{font-size:12px;color:var(--text3);margin-left:auto;}
.manga-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;}
.mcard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;display:block;}
.mcard:hover{transform:translateY(-3px);border-color:var(--border2);}
.mcard-cover{width:100%;aspect-ratio:2/3;background:var(--bg3);position:relative;}
.mcard-cover img{width:100%;height:100%;object-fit:cover;}
.sbadge{position:absolute;top:7px;left:7px;font-size:10px;padding:2px 7px;border-radius:4px;font-family:var(--mono);}
.s-on{background:rgba(76,175,125,.2);color:var(--green);border:1px solid rgba(76,175,125,.3);}
.s-end{background:rgba(91,155,213,.2);color:var(--blue);border:1px solid rgba(91,155,213,.3);}
.s-hi{background:rgba(232,93,74,.15);color:var(--red);border:1px solid rgba(232,93,74,.25);}
.mcard-body{padding:12px 14px 14px;}
.mcard-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.mcard-ja{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;}
.mcard-author{font-size:13px;color:var(--text2);}
.mcard-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.mtag{font-size:11px;padding:2px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text3);}
.load-more-sentinel{height:40px;grid-column:1/-1;}
.loading-row{grid-column:1/-1;display:flex;align-items:center;justify-content:center;padding:2rem;gap:10px;color:var(--text3);font-family:var(--mono);font-size:12px;}
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-msg{grid-column:1/-1;text-align:center;padding:4rem;color:var(--text3);font-size:13px;}

/* ── DETAIL PAGE ── */
.detail-hero{display:flex;gap:24px;padding:24px;border-bottom:1px solid var(--border);}
.det-cover{width:180px;flex-shrink:0;aspect-ratio:2/3;border-radius:8px;overflow:hidden;background:var(--bg3);}
.det-cover img{width:100%;height:100%;object-fit:cover;}
.det-info{flex:1;min-width:0;}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);background:none;border:none;padding:0;margin-bottom:12px;transition:color .2s;}
.back-btn:hover{color:var(--text);}
.det-title{font-family:var(--serif);font-size:clamp(1.4rem,3vw,1.9rem);font-weight:700;line-height:1.2;margin-bottom:4px;}
.det-ja{font-size:13px;color:var(--text3);margin-bottom:14px;}
.meta-list{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.meta-row{display:flex;gap:10px;align-items:baseline;}
.mk{font-size:12px;color:var(--text3);width:68px;flex-shrink:0;}
.mv{font-size:14px;}
.mlink{color:var(--accent);cursor:pointer;transition:opacity .15s;}
.mlink:hover{opacity:.7;}
.det-actions{display:flex;gap:8px;flex-wrap:wrap;}
.dbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;font-size:12px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s;}
.dbtn:hover{border-color:var(--border3);color:var(--text);}
.dbtn.pri{background:var(--accent);border-color:var(--accent);color:#000;font-weight:500;}
.dbtn.pri:hover{background:var(--accent2);}
.xml-out{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:var(--mono);font-size:11px;color:var(--green);white-space:pre;overflow-x:auto;margin-top:12px;max-height:240px;overflow-y:auto;display:none;}
.det-body{padding:24px;}
.sec-h2{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.sec-h2-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.summary-txt{font-size:14px;color:var(--text2);line-height:1.9;white-space:pre-line;margin-bottom:24px;}
.gtags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px;}
.gtag{font-size:12px;padding:3px 10px;border:1px solid var(--border2);border-radius:4px;color:var(--text2);cursor:pointer;transition:border-color .2s;}
.gtag:hover{border-color:var(--accent);color:var(--accent);}

/* 單行本 */
.vol-view-btns{display:flex;gap:4px;}
.vvbtn{background:none;border:1px solid var(--border2);border-radius:4px;padding:3px 10px;font-size:12px;color:var(--text3);transition:all .15s;}
.vvbtn.on{border-color:var(--accent);color:var(--accent);}
.vols-list{display:flex;flex-direction:column;gap:10px;}
.vol-item{display:flex;gap:14px;padding:14px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);height:160px;overflow:hidden;transition:height .3s ease;}
.vol-item.expanded{height:auto;}
.vi-cover{width:96px;flex-shrink:0;aspect-ratio:2/3;border-radius:6px;overflow:hidden;background:var(--bg3);}
.vi-cover img{width:100%;height:100%;object-fit:cover;}
.vi-info{flex:1;min-width:0;}
.vi-num{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:2px;}
.vi-title{font-size:14px;font-weight:500;margin-bottom:5px;}
.vi-summary{font-size:13px;color:var(--text2);line-height:1.65;white-space:pre-line;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.vol-item.expanded .vi-summary{display:block;overflow:visible;-webkit-line-clamp:unset;}
.read-more{background:none;border:none;color:var(--accent);font-size:12px;padding:4px 0 0;cursor:pointer;display:block;}
.read-more:hover{color:var(--accent3);}
.vi-meta{font-size:12px;color:var(--text3);margin-top:5px;}
.vi-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.vibtn{background:none;border:1px solid var(--border2);border-radius:4px;color:var(--text3);font-size:11px;padding:3px 9px;transition:all .15s;}
.vibtn:hover{border-color:var(--accent);color:var(--accent);}
.vols-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.vg{cursor:pointer;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--bg2);transition:transform .2s,border-color .2s;}
.vg:hover{transform:translateY(-3px);border-color:var(--accent);}
.vg-cover{width:100%;aspect-ratio:2/3;background:var(--bg3);position:relative;}
.vg-cover img{width:100%;height:100%;object-fit:cover;}
.vg-badge{position:absolute;bottom:0;left:0;right:0;background:rgba(14,14,14,.88);font-family:var(--mono);font-size:11px;color:var(--accent);text-align:center;padding:5px 0;}
.no-vols{text-align:center;padding:2rem;color:var(--text3);font-size:13px;}

/* VOL POPUP */
.popup-ov{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px;}
.popup-ov.open{display:flex;}
.popup-box{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:640px;display:flex;position:relative;animation:su .2s ease;overflow:hidden;}
.pp-cover{width:200px;flex-shrink:0;aspect-ratio:2/3;}
.pp-cover img{width:100%;height:100%;object-fit:cover;}
.pp-info{flex:1;padding:18px;min-width:0;overflow-y:auto;max-height:440px;}
.pp-close{position:absolute;top:10px;right:10px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:1;}
.pp-close:hover{color:var(--text);}
.pp-num{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:3px;}
.pp-title{font-size:15px;font-weight:500;margin-bottom:10px;}
.pp-summary{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:10px;white-space:pre-line;}
.pp-meta{font-size:12px;color:var(--text3);display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.pp-meta span{color:var(--text2);}
@keyframes su{from{transform:translateY(16px);opacity:0;}}

/* OVERLAYS */
.ov{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);overflow-y:auto;padding:2rem 1rem;}
.ov.open{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:600px;padding:24px;position:relative;animation:su .25s ease;}
.modal h2{font-family:var(--serif);font-size:1.25rem;margin-bottom:4px;}
.modal .sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.mcls{position:absolute;top:14px;right:14px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:30px;height:30px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;}
.mcls:hover{color:var(--text);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.full{grid-column:1/-1;}
.fg label{font-size:11px;color:var(--text3);letter-spacing:.03em;}
.fg input,.fg textarea,.fg select{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .2s;width:100%;}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--accent2);}
.fg textarea{resize:vertical;min-height:72px;}
.fg select option{background:var(--bg3);}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.mbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:6px;font-size:13px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s;}
.mbtn:hover{border-color:var(--border3);color:var(--text);}
.mbtn.pri{background:var(--accent);border-color:var(--accent);color:#000;font-weight:500;}
.mbtn.pri:hover{background:var(--accent2);}

/* ADMIN PAGE */
.admin-page{padding:24px;max-width:900px;margin:0 auto;}
.admin-login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.admin-login h2{font-family:var(--serif);font-size:1.5rem;}
.admin-login input{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;width:240px;text-align:center;}
.admin-login input:focus{border-color:var(--accent2);}
.admin-section{margin-bottom:32px;}
.admin-section h3{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.admin-list{display:flex;flex-direction:column;gap:8px;}
.admin-row{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.admin-row-info{flex:1;min-width:0;}
.admin-row-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.admin-row-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.admin-row-btns{display:flex;gap:6px;flex-shrink:0;}
.aibtn{background:none;border:1px solid var(--border2);border-radius:4px;color:var(--text3);font-size:11px;padding:3px 9px;transition:all .15s;}
.aibtn:hover{border-color:var(--border3);color:var(--text);}
.aibtn.del:hover{border-color:var(--red);color:var(--red);}

// ── UTILS ──────────────────────────────────────────────────
async function api(path,opts={}){
  const r=await fetch(SB+'/rest/v1/'+path,{headers:H,...opts});
  if(opts.raw) return r;
  const ct=r.headers.get('content-type')||'';
  if(ct.includes('json'))return r.json();
  return r;
}
async function count(path){
  const r=await fetch(SB+'/rest/v1/'+path,{headers:{...H,'Prefer':'count=exact','Range':'0-0'}});
  return parseInt(r.headers.get('content-range')?.split('/')[1]||0);
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatDate(d){if(!d)return null;const p=d.slice(0,10).split('-');return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日';}
function formatYM(y,m){if(!y)return null;return y+'年'+(m?m+'月':'');}
function sClass(s){return s==='连载中'?'s-on':s==='完结'?'s-end':'s-hi';}
function sLabel(s){return s==='连载中'?'連載中':s==='完结'?'完結':'休刊';}
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type==='ok'?'ok':type==='err'?'err':'');
  setTimeout(()=>t.classList.add('show'),10);

}

// ── HOME: BANNER ──────────────────────────────────────────
async function loadBanner(){
  const data=await api('banners?is_active=eq.true&order=sort_order.asc');
  state.bannerData=Array.isArray(data)?data:[];
  const track=document.getElementById('bannerTrack');
  const dots=document.getElementById('bannerDots');
  if(!state.bannerData.length){
    document.getElementById('bannerOuter').style.display='none';
    return;
  }
  track.innerHTML=state.bannerData.map((b,i)=>`
    <div class="banner-slide" style="background:${esc(b.bg_color||'#12110e')}">
      <div class="slide-content">
        <p class="slide-tag">${esc(b.tag||'')}</p>
        <h2 class="slide-title">${esc(b.title||'')}</h2>
        <p class="slide-sub">${esc(b.subtitle||'')}</p>
        ${b.btn_text?`<a class="slide-btn" href="${esc(b.btn_url||'#')}">${esc(b.btn_text)}</a>`:''}
      </div>
      ${b.cover_url?`<div class="slide-cover"><img src="${esc(b.cover_url)}" alt="" loading="lazy"></div>`:''}
    </div>`).join('');
  dots.innerHTML=state.bannerData.map((_,i)=>`<div class="bdot${i===0?' on':''}" onclick="goBanner(${i})"></div>`).join('');
  startBannerTimer();
}
function startBannerTimer(){
  clearInterval(state.bannerTimer);
  if(state.bannerData.length>1)
    state.bannerTimer=setInterval(()=>moveBanner(1),5000);
}
function moveBanner(d){goBanner((state.bannerIdx+d+state.bannerData.length)%state.bannerData.length);}
function goBanner(n){
  state.bannerIdx=n;
  document.getElementById('bannerTrack').style.transform=`translateX(-${n*100}%)`;
  document.querySelectorAll('.bdot').forEach((d,i)=>d.classList.toggle('on',i===n));
  startBannerTimer();
}

function getRecentCols(){

  const w=window.innerWidth;
  if(w>3200) return 20;
  if(w>2400) return 14;
  if(w>1600) return 10;
  if(w>1200) return 8;
  if(w>800)  return 6;
  if(w>500)  return 4;
  return 3;
}
async function loadRecent(){
  // 先插入一個佔位元素，讓 CSS 渲染網格，再讀取實際列數
  const grid=document.getElementById('recentGrid');
  grid.innerHTML='<div style="visibility:hidden;aspect-ratio:2/3;width:100%"></div>';
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  const colsStr=getComputedStyle(grid).gridTemplateColumns;
  const cols=colsStr.trim().split(/\s+/).length||10;
  const limit=cols*2;
  grid.innerHTML=`<div class="loading-row" style="grid-column:1/-1"><div class="spin"></div>載入中…</div>`;
  const mangas=await api(`manga?select=id,title_zh,cover_url,latest_release,volume_count,status&order=latest_release.desc.nullslast&limit=${limit}`);
  if(!Array.isArray(mangas)||!mangas.length){grid.innerHTML='<div style="color:var(--text3);font-size:13px">暫無資料</div>';return;}
  const now=new Date();
  grid.innerHTML=mangas.map(m=>{
    const d=m.latest_release?new Date(m.latest_release):null;
    const isNew=d&&(now-d)<1000*60*60*24*14;
    return `<div class="rc" onclick="goDetail('${m.id}')">
      <div class="rc-cover">
        ${m.cover_url?`<img src="${esc(m.cover_url)}" alt="" loading="lazy">`:'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px">NO IMG</div>'}
        ${isNew?'<span class="rc-new">NEW</span>':''}
      </div>
      <div class="rc-body">
        <p class="rc-vol">${m.volume_count?'最新 Vol.'+m.volume_count:''}</p>
        <p class="rc-title">${esc(m.title_zh||'—')}</p>
        <p class="rc-date">${formatDate(m.latest_release)||'—'}</p>
      </div>
    </div>`;
  }).join('');
}

// ── SEARCH ────────────────────────────────────────────────
function resetSearch(){
  state.srOffset=0;state.srTotal=null;state.srHasMore=true;
  document.getElementById('mangaGrid').innerHTML='';
  document.getElementById('resultInfo').textContent='';
  document.querySelectorAll('.chip').forEach(c=>{
    const isAll=c.textContent==='全部';
    c.classList.toggle('on',isAll?!state.statusFilter:c.textContent.includes(sLabel(state.statusFilter)));
  });
  loadSearchPage().then(()=>checkSentinel());
}
function checkSentinel(){
  const s=document.getElementById('sentinel');
  const grid=document.getElementById('mangaGrid');
  if(!s||!grid||state.page!=='search') return;
  // 如果 sentinel 在視窗內或 grid 未填滿，繼續載入
  const rect=s.getBoundingClientRect();
  if(rect.top < window.innerHeight + 400) loadSearchPage().then(()=>{
    if(state.srHasMore) setTimeout(checkSentinel, 100);
  });
}

async function buildSearchQuery(forCount=false){
  const sel=forCount?'id':'id,title_zh,title_ja,cover_url,writer,status,genres,latest_release';
  let q=`manga?select=${sel}`;
  if(state.statusFilter) q+=`&status=eq.${encodeURIComponent(state.statusFilter)}`;
  if(state.tagFilter&&state.tagFilter!=='__latest__'){
    const tv=state.tagFilter;
    q+=`&or=(genres.cs.${encodeURIComponent('{"'+tv+'"}')},tags.cs.${encodeURIComponent('{"'+tv+'"}')})`;
  } else if(state.searchQ){
    const qv=encodeURIComponent('%'+state.searchQ+'%');
    q+=`&or=(title_zh.ilike.${qv},title_ja.ilike.${qv},writer.ilike.${qv},publisher.ilike.${qv})`;
  }
  if(!forCount){
    q+=`&order=latest_release.desc.nullslast,created_at.desc&limit=${PAGE}&offset=${state.srOffset}`;
  }
  return q;
}

async function loadSearchPage(){
  if(state.srLoading||!state.srHasMore)return;
  state.srLoading=true;
  const grid=document.getElementById('mangaGrid');
  if(state.srOffset===0){
    grid.innerHTML=`<div class="loading-row"><div class="spin"></div>載入中…</div>`;
    const cq=await buildSearchQuery(true);
    state.srTotal=await count(cq);
    const label=state.tagFilter==='__latest__'?'最新更新':'搜尋結果';
    document.getElementById('resultInfo').textContent=`${label}：${state.srTotal.toLocaleString()} 部`;
  }
  const q=await buildSearchQuery(false);
  const data=await api(q);
  if(state.srOffset===0) grid.innerHTML='';
  if(!Array.isArray(data)||!data.length){
    if(state.srOffset===0) grid.innerHTML='<div class="empty-msg">沒有找到相關漫畫</div>';
    state.srHasMore=false; state.srLoading=false; return;
  }
  grid.insertAdjacentHTML('beforeend', data.map(m=>`
    <a class="mcard" href="?id=${m.id}" onclick="event.preventDefault();goDetail('${m.id}')">
      <div class="mcard-cover">
        ${m.cover_url?`<img src="${esc(m.cover_url)}" alt="" loading="lazy">`:''}
        <span class="sbadge ${sClass(m.status)}">${sLabel(m.status)}</span>
      </div>
      <div class="mcard-body">
        <p class="mcard-title">${esc(m.title_zh||'—')}</p>
        <p class="mcard-ja">${esc(m.title_ja||'')}</p>
        <p class="mcard-author">${esc(m.writer||'')}</p>
        <div class="mcard-tags">${(m.genres||[]).slice(0,3).map(g=>`<span class="mtag">${esc(g)}</span>`).join('')}</div>
      </div>
    </a>`).join(''));
  state.srOffset+=data.length;
  state.srHasMore=data.length===PAGE;
  state.srLoading=false;
}

function setChip(val,el){
  state.statusFilter=val;

const obs=new IntersectionObserver(e=>{
  if(e[0].isIntersecting&&state.page==='search'&&!state.srLoading&&state.srHasMore)
    loadSearchPage().then(()=>{if(state.srHasMore)checkSentinel();});
},{rootMargin:'400px'});
obs.observe(document.getElementById('sentinel'));
// scroll 事件雙保險（桌面端內容不足時 IO 不會再次觸發）
window.addEventListener('scroll',()=>{
  if(state.page==='search'&&!state.srLoading&&state.srHasMore) checkSentinel();
},{passive:true});

// ── XML EXPORT ────────────────────────────────────────────
function buildXML(m,vol){
  const x=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let yr='',mo='',dy='';
  if(vol?.publish_date){const p=vol.publish_date.split('-');yr=p[0]||'';mo=p[1]||'';dy=p[2]||'';}
  else{yr=m.start_year||'';mo=m.start_month||'';}
  return `<?xml version="1.0" encoding="utf-8"?>
<ComicInfo xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <Series>${x(m.title_zh)}</Series>
  <LocalizedSeries>${x(m.title_ja)}</LocalizedSeries>
  <Number>${vol?vol.volume_number:''}</Number>
  <Count>${m.volume_count||''}</Count>
  <Summary>${x(vol?.summary||m.summary)}</Summary>
  <Publisher>${x(m.publisher)}</Publisher>
  <Imprint>${x(m.imprint)}</Imprint>
  <Writer>${x(m.writer)}</Writer>
  <Penciller>${x(m.penciller||m.writer)}</Penciller>
  <Genre>${x((m.genres||[]).join(','))}</Genre>
  <Tags>${x((m.tags||[]).join(','))}</Tags>
  <AgeRating>${x(m.age_rating)}</AgeRating>
  <BlackAndWhite>${m.is_bw?'Yes':'No'}</BlackAndWhite>
  <Manga>${x(m.manga_direction||'YesAndRightToLeft')}</Manga>
  <LanguageISO>${x(m.language||'ja')}</LanguageISO>
  <Year>${yr}</Year><Month>${mo}</Month><Day>${dy}</Day>
  <CommunityRating>${m.rating||''}</CommunityRating>
</ComicInfo>`;
}
function exportXML(vol){
  const m=state.currentManga;if(!m)return;
  const xml=buildXML(m,vol||null);
  const out=document.getElementById('xmlOut');
  if(out){out.textContent=xml;out.style.display='block';}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([xml],{type:'application/xml'}));
  a.download=(m.title_zh||'manga')+(vol?`_Vol${vol.volume_number}`:'')+`_ComicInfo.xml`;
  a.click();
  showToast('✓ ComicInfo.xml 已下載','ok');
}
function copyAPI(){
  const m=state.currentManga;if(!m)return;
  navigator.clipboard.writeText(`${SB}/rest/v1/manga?id=eq.${m.id}&select=*`);
  showToast('✓ API 網址已複製','ok');
}

  f('f-writer',e?manga.writer:'');f('f-penciller',e?manga.penciller:'');
  f('f-pub',e?manga.publisher:'');f('f-imp',e?manga.imprint:'');
  f('f-cover',e?manga.cover_url:'');f('f-year',e?manga.start_year:'');
  f('f-month',e?manga.start_month:'');f('f-count',e?manga.volume_count:'');

async function submitManga(){
  const zh=document.getElementById('f-zh').value.trim();
  if(!zh){showToast('請填寫中文標題','err');return;}
  const wr=document.getElementById('f-writer').value.trim();
  const pc=document.getElementById('f-penciller').value.trim();
  const body={title_zh:zh,title_ja:document.getElementById('f-ja').value.trim()||null,
    writer:wr||null,penciller:pc||wr||null,
    publisher:document.getElementById('f-pub').value.trim()||null,
    imprint:document.getElementById('f-imp').value.trim()||null,
    status:document.getElementById('f-status').value,age_rating:document.getElementById('f-age').value,
    genres:document.getElementById('f-genres').value.split(',').map(s=>s.trim()).filter(Boolean)||null,
    tags:document.getElementById('f-tags').value.split(',').map(s=>s.trim()).filter(Boolean)||null,
    cover_url:document.getElementById('f-cover').value.trim()||null,
    start_year:parseInt(document.getElementById('f-year').value)||null,
    start_month:parseInt(document.getElementById('f-month').value)||null,
    volume_count:parseInt(document.getElementById('f-count').value)||null,
    summary:document.getElementById('f-summary').value.trim()||null};
  const m=state.editManga;
  const r=m?await fetch(`${SB}/rest/v1/manga?id=eq.${m.id}`,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(body)}):
             await fetch(`${SB}/rest/v1/manga`,{method:'POST',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(body)});
  if(r.ok){
    showToast(m?'✓ 已更新':'✓ 提交成功','ok');closeMangaForm();

async function toggleNews(id,cur){
  await fetch(`${SB}/rest/v1/news?id=eq.${id}`,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify({is_active:!cur})});
  loadAdminNews();
}
async function delBanner(id){if(!confirm('確定刪除？'))return;await fetch(`${SB}/rest/v1/banners?id=eq.${id}`,{method:'DELETE',headers:H});loadAdminBanners();}
async function delNews(id){if(!confirm('確定刪除？'))return;await fetch(`${SB}/rest/v1/news?id=eq.${id}`,{method:'DELETE',headers:H});loadAdminNews();}

      </div>
      <div class="mactions">
        <button class="mbtn" onclick="document.getElementById('bannerFormOv').remove()">取消</button>
        <button class="mbtn pri" onclick="saveBanner('${b?.id||''}')">儲存</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend',html);

async function saveBanner(id){
  const title=document.getElementById('bf-title').value.trim();
  if(!title){showToast('請填寫標題','err');return;}
  const body={title,tag:document.getElementById('bf-tag').value.trim()||null,
    subtitle:document.getElementById('bf-sub').value.trim()||null,
    btn_text:document.getElementById('bf-btn').value.trim()||null,
    btn_url:document.getElementById('bf-url').value.trim()||null,
    cover_url:document.getElementById('bf-cover').value.trim()||null,
    bg_color:document.getElementById('bf-bg').value.trim()||'#12110e',
    sort_order:parseInt(document.getElementById('bf-sort').value)||0};
  const r=id?await fetch(`${SB}/rest/v1/banners?id=eq.${id}`,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(body)}):
              await fetch(`${SB}/rest/v1/banners`,{method:'POST',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(body)});
  if(r.ok){showToast('✓ 已儲存','ok');document.getElementById('bannerFormOv').remove();document.body.style.overflow='';loadAdminBanners();}
  else{showToast('儲存失敗','err');}
}

// News Form
function openNewsForm(n=null){
  const html=`<div class="ov open" id="newsFormOv" onclick="ovClick(event,'newsFormOv',()=>document.getElementById('newsFormOv').remove())">
    <div class="modal">
      <button class="mcls" onclick="document.getElementById('newsFormOv').remove()">×</button>

      <div class="fgrid">
        <div class="fg"><label>日期（顯示用）</label><input id="nf-date" value="${esc(n?.date||'')}" placeholder="03/15"></div>
        <div class="fg"><label>排序</label><input type="number" id="nf-sort" value="${n?.sort_order||0}"></div>
        <div class="fg full"><label>內容 *</label><input id="nf-content" value="${esc(n?.content||'')}" placeholder="資料庫新增《地獄廚房》1-16 卷"></div>
      </div>
      <div class="mactions">
        <button class="mbtn" onclick="document.getElementById('newsFormOv').remove()">取消</button>

      </div>
    </div>

  document.body.insertAdjacentHTML('beforeend',html);

async function saveNews(id){
  const content=document.getElementById('nf-content').value.trim();
  if(!content){showToast('請填寫內容','err');return;}
  const body={content,date:document.getElementById('nf-date').value.trim()||null,
    sort_order:parseInt(document.getElementById('nf-sort').value)||0};
  const r=id?await fetch(`${SB}/rest/v1/news?id=eq.${id}`,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(body)}):
              await fetch(`${SB}/rest/v1/news`,{method:'POST',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(body)});
  if(r.ok){showToast('✓ 已儲存','ok');document.getElementById('newsFormOv').remove();document.body.style.overflow='';loadAdminNews();}
  else{showToast('儲存失敗','err');}
}

// ── BROWSER HISTORY ───────────────────────────────────────
document.getElementById('logoBtn').onclick=()=>goHome();
window.addEventListener('popstate',e=>{
  const id=new URLSearchParams(location.search).get('id');
  const adm=new URLSearchParams(location.search).get('admin');
  if(id){setPage('detail');renderDetail(id);}
  else if(adm!==null){setPage('admin');renderAdmin();}
  else{setPage('home');}
});

// ── INIT ──────────────────────────────────────────────────
(async()=>{
  const params=new URLSearchParams(location.search);
  const id=params.get('id');
  const adm=params.get('admin');
  if(id){setPage('detail');await renderDetail(id);}
  else if(adm!==null){setPage('admin');renderAdmin();}
  else{
    setPage('home');
    await Promise.all([loadBanner(),loadNews(),loadRecent(),loadCategories()]);
  }
})();

let _resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(()=>{
    if(state.page==='home') loadRecent();
  },400);
});
</script>
